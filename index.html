<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فنار | نظام رصد النقاط</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --deep:#023047;
  --ocean:#0077b6;
  --teal:#0096a3;
  --turq:#48cae4;
  --foam:#eaf7fb;
  --sand:#f2b84b;
  --sand-deep:#e09b2d;
  --coral:#e8623c;
  --white:#ffffff;
  --ink:#0b2b3c;
  --line:#d3ecf2;
  --shadow: 0 10px 30px -12px rgba(2,48,71,.25);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Almarai', sans-serif;
  background:
    radial-gradient(1200px 500px at 100% -10%, #d9f2f8 0%, transparent 60%),
    radial-gradient(1000px 500px at -10% 10%, #e4f6ee 0%, transparent 55%),
    var(--foam);
  color:var(--ink);
  min-height:100vh;
}
h1,h2,h3,.display{font-family:'Tajawal', sans-serif;}

/* ===== Header ===== */
.topbar{
  background: linear-gradient(120deg, var(--deep) 0%, var(--ocean) 55%, var(--teal) 100%);
  color:#fff;
  position:relative;
  overflow:hidden;
}
.topbar-inner{
  max-width:1280px; margin:0 auto; padding:26px 28px 46px;
  display:flex; align-items:center; justify-content:space-between; gap:20px; position:relative; z-index:2;
}
.brand{display:flex; align-items:center; gap:14px;}
.brand .logo-circle{
  width:76px; height:76px; border-radius:50%; background:#fff;
  display:flex; align-items:center; justify-content:center; flex:none;
  box-shadow: 0 8px 20px -6px rgba(0,0,0,.35);
  padding:8px;
}
.brand .logo-img{
  height:100%; width:100%; object-fit:contain;
}
.brand h1{font-size:26px; font-weight:900; letter-spacing:.3px;}
.brand p{font-size:13px; opacity:.85; margin-top:2px; font-weight:400;}
.deadline-chip{
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.28);
  backdrop-filter: blur(6px);
  border-radius:999px; padding:9px 18px;
  display:flex; align-items:center; gap:10px; font-size:14px; font-weight:700;
}
.deadline-chip i{color:var(--sand);}
.wave{
  position:absolute; bottom:-2px; left:0; width:100%; line-height:0; z-index:1;
}
.wave svg{width:100%; height:60px; display:block;}

/* ===== Nav ===== */
.nav-wrap{max-width:1280px; margin:-30px auto 0; padding:0 28px; position:relative; z-index:5;}
.nav{
  background:#fff; border-radius:20px; box-shadow:var(--shadow);
  display:flex; gap:6px; padding:8px; overflow-x:auto;
}
.nav button{
  flex:1 1 auto; white-space:nowrap;
  border:none; background:transparent; cursor:pointer;
  padding:12px 16px; border-radius:14px; font-family:'Tajawal', sans-serif;
  font-weight:700; font-size:14px; color:#5a7d8c;
  display:flex; align-items:center; gap:8px; transition:.2s;
}
.nav button i{font-size:15px;}
.nav button:hover{background:var(--foam); color:var(--ocean);}
.nav button.active{
  background: linear-gradient(120deg, var(--ocean), var(--teal));
  color:#fff; box-shadow:0 8px 18px -6px rgba(0,119,182,.55);
}
.mobile-nav{
  display:none;
  position:relative;
  background:#fff; border-radius:16px; box-shadow:var(--shadow);
  align-items:center; padding:4px 16px;
}
.mobile-nav-icon{color:var(--ocean); font-size:15px;}
.mobile-nav-caret{color:#8fa9b3; font-size:12px; pointer-events:none;}
.mobile-nav select{
  flex:1; border:none; background:transparent; appearance:none; -webkit-appearance:none;
  font-family:'Tajawal'; font-weight:700; font-size:15px; color:var(--deep);
  padding:14px 10px; direction:rtl;
}
.mobile-nav select:focus{outline:none;}

/* ===== Layout ===== */
main{max-width:1280px; margin:0 auto; padding:26px 28px 60px;}

/* ===== Home cards ===== */
.hero-card{
  background:#fff; border-radius:22px; padding:26px 28px; box-shadow:var(--shadow);
  display:flex; align-items:center; justify-content:space-between; gap:20px; margin-bottom:22px;
  border:1px solid var(--line);
}
.hero-card h2{font-size:20px; color:var(--deep); margin-bottom:6px;}
.hero-card p{color:#5a7d8c; font-size:14px; line-height:1.8;}
.hero-stats{display:flex; gap:14px;}
.stat-pill{
  text-align:center; background:var(--foam); border-radius:16px; padding:14px 20px; min-width:96px;
}
.stat-pill b{display:block; font-size:22px; color:var(--ocean); font-family:'Tajawal';}
.stat-pill span{font-size:12px; color:#5a7d8c;}

.dept-grid{display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:18px;}
.dept-card{
  background:#fff; border-radius:20px; padding:22px; box-shadow:var(--shadow); cursor:pointer;
  border:1px solid var(--line); transition:.25s; position:relative; overflow:hidden;
}
.dept-card:hover{transform:translateY(-4px); box-shadow:0 16px 34px -14px rgba(2,48,71,.35);}
.dept-card .icon{
  width:50px; height:50px; border-radius:14px; display:flex; align-items:center; justify-content:center;
  font-size:20px; color:#fff; margin-bottom:14px;
}
.dept-card h3{font-size:17px; color:var(--deep); margin-bottom:6px;}
.dept-card .meta{font-size:12.5px; color:#6b8b98; display:flex; gap:14px; margin-top:12px;}
.dept-card .meta span{display:flex; align-items:center; gap:5px;}
.dept-card .top-badge{
  position:absolute; top:18px; left:18px; font-size:11px; background:var(--foam); color:var(--ocean);
  padding:5px 10px; border-radius:999px; font-weight:700;
}

/* ===== Department view ===== */
.dept-header{display:flex; align-items:center; gap:14px; margin-bottom:20px;}
.dept-header .icon-lg{
  width:56px; height:56px; border-radius:16px; display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:24px; box-shadow:var(--shadow);
}
.dept-header h2{font-size:22px; color:var(--deep);}
.dept-header p{font-size:13px; color:#6b8b98;}
.back-btn{
  border:none; background:#fff; color:var(--ocean); border-radius:12px; padding:9px 14px; cursor:pointer;
  font-family:'Tajawal'; font-weight:700; font-size:13px; box-shadow:var(--shadow); display:flex; gap:8px; align-items:center;
}
.quick-add-btn{
  border:none; background:linear-gradient(120deg, var(--sand), var(--sand-deep)); color:var(--deep); border-radius:12px;
  padding:11px 18px; cursor:pointer; font-family:'Tajawal'; font-weight:800; font-size:13.5px;
  box-shadow:0 8px 18px -6px rgba(224,155,45,.5); display:flex; gap:8px; align-items:center; white-space:nowrap;
}
.quick-add-btn:hover{filter:brightness(1.05);}
.master-btn{
  border:none; background:linear-gradient(120deg, var(--deep), var(--ocean)); color:#fff; border-radius:12px;
  padding:11px 18px; cursor:pointer; font-family:'Tajawal'; font-weight:800; font-size:13.5px;
  box-shadow:0 8px 18px -6px rgba(2,48,71,.5); display:flex; gap:8px; align-items:center; white-space:nowrap;
}
.master-btn:hover{filter:brightness(1.15);}

.master-dept-block{
  background:#fff; border-radius:20px; border-top:5px solid var(--ocean); box-shadow:var(--shadow);
  padding:22px; margin-bottom:22px;
}
.master-dept-title{display:flex; align-items:center; gap:12px; margin-bottom:16px;}
.master-dept-title .icon{
  width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center;
  font-size:17px; color:#fff; flex:none;
}
.master-dept-title h3{font-size:17px; color:var(--deep);}
.master-dept-block .panel{box-shadow:none; border:none; padding:0; margin-bottom:0;}

.panel{background:#fff; border-radius:20px; padding:22px; box-shadow:var(--shadow); border:1px solid var(--line); margin-bottom:20px;}
.panel h3{font-size:16px; color:var(--deep); margin-bottom:16px; display:flex; align-items:center; gap:8px;}
.panel h3 i{color:var(--sand-deep);}

.form-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:12px; align-items:end;}
.field label{display:block; font-size:11.5px; color:#5a7d8c; margin-bottom:6px; font-weight:700;}
.field input{
  width:100%; border:1.5px solid var(--line); border-radius:10px; padding:9px 10px; font-family:'Almarai';
  font-size:13.5px; background:var(--foam); color:var(--ink); transition:.2s;
}
.field input:focus{outline:none; border-color:var(--teal); background:#fff;}
.field.chk{display:flex; align-items:center; gap:8px; background:var(--foam); border-radius:10px; padding:9px 10px; border:1.5px solid var(--line); height:38px;}
.field.chk input{width:18px; height:18px; accent-color:var(--ocean); flex:none;}
.field.chk label{margin:0; font-size:12.5px;}
.add-btn{
  grid-column:span 1; border:none; border-radius:10px; padding:10px; cursor:pointer;
  background:linear-gradient(120deg, var(--ocean), var(--teal)); color:#fff; font-family:'Tajawal'; font-weight:700; font-size:13.5px;
  display:flex; align-items:center; justify-content:center; gap:6px; height:38px;
}
.add-btn:hover{filter:brightness(1.06);}

table{width:100%; border-collapse:collapse; font-size:13.5px;}
thead th{
  background:var(--deep); color:#fff; padding:11px 8px; font-weight:700; font-family:'Tajawal'; font-size:12.5px;
  position:sticky; top:0;
}
thead th:first-child{border-radius:10px 0 0 0;}
thead th:last-child{border-radius:0 10px 0 0;}
tbody td{padding:10px 8px; text-align:center; border-bottom:1px solid var(--line); color:var(--ink);}
tbody tr:hover{background:var(--foam);}
tbody td.name-cell{font-weight:700; text-align:right; padding-right:14px; color:var(--deep);}
.total-cell{font-weight:800; color:var(--ocean); font-family:'Tajawal';}
.attend-yes{color:#12986b; font-size:15px;}
.attend-no{color:#c94a3b; font-size:15px;}
.del-btn{border:none; background:transparent; color:#c94a3b; cursor:pointer; font-size:14px; opacity:.6;}
.del-btn:hover{opacity:1;}
.table-scroll{overflow-x:auto; border-radius:10px;}
.empty-state{padding:34px 10px; text-align:center; color:#8fa9b3;}
.empty-state i{font-size:30px; margin-bottom:10px; color:var(--turq);}

#bulkNamesInput{
  width:100%; border:1.5px solid var(--line); border-radius:12px; padding:14px; font-family:'Almarai';
  font-size:14px; background:var(--foam); color:var(--ink); resize:vertical; line-height:1.9;
}
#bulkNamesInput:focus{outline:none; border-color:var(--teal); background:#fff;}
.status-banner{
  margin-top:14px; background:#e7f8f0; border:1.5px solid #b7e9cf; color:#12704f;
  border-radius:12px; padding:12px 16px; font-size:13.5px; font-weight:700;
  display:flex; align-items:center; gap:10px;
}
.status-banner i{font-size:16px; color:#12986b;}
.summary-toolbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:10px;}
.note{font-size:12.5px; color:#5a7d8c; background:var(--foam); padding:8px 14px; border-radius:10px; display:flex; align-items:center; gap:8px;}

/* ===== إدارة المشتركات ===== */
.chip-list{display:flex; flex-wrap:wrap; gap:8px;}
.chip{
  background:var(--foam); border:1.5px solid var(--line); border-radius:999px; padding:6px 8px 6px 14px;
  font-size:12.5px; font-weight:700; color:var(--deep); display:flex; align-items:center; gap:8px;
}
.chip i{cursor:pointer; color:#c94a3b; background:#fff; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px;}
.chip i:hover{background:#fde3de;}
select#f_name{
  width:100%; border:1.5px solid var(--line); border-radius:10px; padding:9px 10px; font-family:'Almarai';
  font-size:13.5px; background:var(--foam); color:var(--ink);
}
select#f_name:focus{outline:none; border-color:var(--teal); background:#fff;}

/* ===== طباعة ===== */
.print-btn{
  border:none; background:var(--foam); color:var(--ocean); border-radius:10px; padding:9px 16px; cursor:pointer;
  font-family:'Tajawal'; font-weight:700; font-size:13px; display:flex; align-items:center; gap:8px; border:1.5px solid var(--line);
}
.print-btn:hover{background:var(--turq); color:#fff; border-color:var(--turq);}
.print-header{display:none;}
@media print{
  @page{ size:A4; margin:14mm; }
  body{ background:#fff !important; }
  body.print-mode *{ visibility:hidden; }
  body.print-mode .print-target, body.print-mode .print-target *{ visibility:visible; }
  body.print-mode .print-target{
    position:absolute; inset:0; width:100%; box-shadow:none; border:none; padding:0;
  }
  body.print-mode .no-print, body.print-mode .print-btn{ display:none !important; }
  .print-header{ display:block !important; margin-bottom:16px; }
  .print-header h2{ font-size:19px; color:#023047; margin-bottom:4px; }
  .print-header p{ font-size:12px; color:#5a7d8c; }
  thead th{ background:#023047 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
}
.bonus-tag{background:linear-gradient(120deg,var(--sand),var(--sand-deep)); color:var(--deep); font-size:11px; font-weight:800; padding:3px 9px; border-radius:999px; display:inline-flex; align-items:center; gap:4px;}
.rank-cell{font-family:'Tajawal'; font-weight:900; color:var(--ocean); font-size:14px;}
.rank-1{color:var(--sand-deep);}

footer{text-align:center; padding:24px; font-size:12px; color:#89a9b4;}

.sub-nav{max-width:360px; margin-bottom:20px;}

/* ===================== الاستجابة: آيباد وأجهزة لوحية (≤1024px) ===================== */
@media(max-width:1024px){
  main{padding:22px 20px 50px;}
  .topbar-inner{padding:24px 20px 44px;}
  .nav-wrap{padding:0 20px;}
  .form-grid{grid-template-columns:repeat(3,1fr);}
  .add-btn{grid-column:span 3;}
  .dept-grid{grid-template-columns:repeat(auto-fit, minmax(240px,1fr));}
}

/* ===================== الاستجابة: الجوال والآيباد الرأسي (≤768px) ===================== */
@media(max-width:768px){
  .topbar-inner{flex-direction:column; align-items:flex-start; gap:16px; padding:20px 18px 40px;}
  .brand .logo-circle{width:60px; height:60px; padding:6px;}
  .brand h1{font-size:21px;}
  .deadline-chip{font-size:12.5px; padding:8px 14px;}

  #mainNav{display:none;}
  .mobile-nav{display:flex;}

  .hero-card{flex-direction:column; align-items:stretch; padding:20px;}
  .hero-stats{width:100%;}
  .stat-pill{flex:1;}

  .dept-header{flex-wrap:wrap; gap:12px;}
  .dept-header .icon-lg{width:46px; height:46px; font-size:19px;}
  .dept-header h2{font-size:18px;}
  .quick-add-btn{flex:1; justify-content:center;}
  .back-btn{order:-1;}

  .sub-nav{max-width:100%;}
  .sub-nav button{flex:1; justify-content:center; font-size:13px; padding:11px 8px;}

  .form-grid{grid-template-columns:repeat(2,1fr); gap:10px;}
  .add-btn{grid-column:span 2;}
  .panel{padding:18px 16px;}

  .summary-toolbar{flex-direction:column; align-items:stretch;}
  .summary-toolbar h3{font-size:15px;}
  .print-btn{justify-content:center;}

  table{font-size:12.5px;}
  thead th{padding:9px 6px; font-size:11px;}
  tbody td{padding:8px 6px;}
}

/* ===================== الاستجابة: الجوال الصغير (≤480px) ===================== */
@media(max-width:480px){
  .brand{gap:10px;}
  .brand .logo-circle{width:50px; height:50px; padding:5px;}
  .brand h1{font-size:18px;}
  .brand p{font-size:11.5px;}
  .deadline-chip{width:100%;}
  .deadline-chip span{font-size:11.5px;}

  .hero-card h2{font-size:17px;}
  .hero-stats{flex-direction:column;}

  .form-grid{grid-template-columns:1fr;}
  .add-btn{grid-column:span 1;}
  .field.chk{height:44px;}

  .dept-card{padding:18px;}
  .dept-header p{display:none;}

  .chip{font-size:11.5px;}
  table{font-size:11.5px;}
}
</style>
</head>

<script>
/* ============ إعداد الأقسام ============ */
const DEPARTMENTS = [
  { id:'agri',  name:'إدارة الزراعة والمياه',    icon:'fa-solid fa-seedling',        color1:'#2a9d8f', color2:'#1d7a6f', password:'248715' },
  { id:'ind',   name:'إدارة الصناعة والكهرباء',   icon:'fa-solid fa-bolt',            color1:'#0077b6', color2:'#023e7d', password:'429333' },
  { id:'edu',   name:'إدارة التعليم والثقافة',    icon:'fa-solid fa-book-open',       color1:'#0096a3', color2:'#00707a', password:'372624' },
  { id:'health',name:'إدارة الصحة والرياضة',      icon:'fa-solid fa-heart-pulse',     color1:'#e8623c', color2:'#c94a2b', password:'786187' },
  { id:'art',   name:'إدارة المجتمع والفنون',     icon:'fa-solid fa-palette',         color1:'#e09b2d', color2:'#b97b16', password:'766392' },
  { id:'media', name:'إدارة الاتصالات والإعلام',  icon:'fa-solid fa-satellite-dish',  color1:'#48cae4', color2:'#0096a3', password:'863046' },
];

const STORAGE_KEY = 'fanar-points-data';

let STATE = {
  deadline: '15 صفر',
  departments: {} // id -> { members:[{id,name}], entries: [{id,name,date,memo,cultural,attendance,system,violations}] }
};

DEPARTMENTS.forEach(d => STATE.departments[d.id] = { members: [], entries: [] });

let currentView = 'home';
let currentDept = null;
let currentTab = 'log'; // log | summary
let addMembersDept = null;   // القسم المختار حالياً في صفحة إضافة المشتركات
let addMembersStatus = null; // آخر نتيجة إضافة {added, dup}

/* ============ حماية كل قسم بكلمة مرور خاصة (ثابتة، تعمل من أي جهاز) ============ */
const MASTER_PASSWORD = '758369'; // كلمة مرور المشرفة العامة — تفتح كل الأقسام دفعة واحدة
let unlockedDepts = new Set(); // تبقى مفتوحة أثناء هذه الجلسة فقط (حتى إعادة تحميل الصفحة)
let masterUnlocked = false;

function requireDeptAccess(deptId){
  if(masterUnlocked || unlockedDepts.has(deptId)) return true;
  const dept = getDept(deptId);
  const entered = prompt(`كلمة مرور قسم:\n"${dept.name}"`);
  if(entered === null) return false;
  if(entered !== dept.password){ alert('كلمة المرور غير صحيحة'); return false; }
  unlockedDepts.add(deptId);
  return true;
}

function goToMasterView(){
  if(!masterUnlocked){
    const entered = prompt('كلمة مرور المشرفة العامة:');
    if(entered === null) return;
    if(entered !== MASTER_PASSWORD){ alert('كلمة المرور غير صحيحة'); return; }
    masterUnlocked = true;
    DEPARTMENTS.forEach(d=> unlockedDepts.add(d.id));
  }
  currentView = 'master';
  setActiveNav('master');
  render();
}

/* ============ إعداد Firebase ============
   عبّئي القيم الأربع التالية من مشروعك في Firebase (راجعي الشرح المرفق للخطوات).
   طالما بقيت القيم كما هي (تبدأ بـ "ضعي")، سيعمل النظام بالتخزين المحلي القديم تلقائياً كخطة بديلة. */
const firebaseConfig = {
  apiKey: "AIzaSyBwfZjwcTjlpJ6FwOXpgQ_cGs8ciOwFNJE",
  authDomain: "fanar-b3eea.firebaseapp.com",
  projectId: "fanar-b3eea",
  storageBucket: "fanar-b3eea.firebasestorage.app",
  messagingSenderId: "472730191033",
  appId: "1:472730191033:web:beb1c682e21c0298294768"
};

let db = null;
let firebaseReady = false;
const FS_COLLECTION = 'fanar';
const FS_DOC = 'state';

function isFirebaseConfigured(){
  return firebaseConfig.apiKey && !firebaseConfig.apiKey.startsWith('ضعي');
}

function initFirebase(){
  try{
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
  }catch(e){
    console.error('تعذر الاتصال بـ Firebase، سيعمل النظام بالتخزين المحلي بدلاً منه', e);
    firebaseReady = false;
  }
}

function applyIncomingState(parsed){
  STATE.deadline = parsed.deadline || STATE.deadline;
  DEPARTMENTS.forEach(d=>{
    const pd = (parsed.departments && parsed.departments[d.id]) || {};
    STATE.departments[d.id].entries = pd.entries || [];
    STATE.departments[d.id].members = pd.members || [];
  });
  // توافق مع بيانات قديمة: أي اسم ورد في السجلات ولم يكن في قائمة المشتركات يُضاف تلقائياً
  DEPARTMENTS.forEach(d=>{
    const dept = STATE.departments[d.id];
    const known = new Set(dept.members.map(m=>m.name));
    dept.entries.forEach(e=>{
      if(!known.has(e.name)){ dept.members.push({id:uid(), name:e.name}); known.add(e.name); }
    });
  });
  document.getElementById('deadlineText').textContent = STATE.deadline;
}

/* التخزين المحلي (خطة بديلة إن لم يُفعّل Firebase بعد) */
function loadStateLocal(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) applyIncomingState(JSON.parse(raw));
    else document.getElementById('deadlineText').textContent = STATE.deadline;
  }catch(e){
    console.error('تعذر تحميل البيانات المحفوظة', e);
    document.getElementById('deadlineText').textContent = STATE.deadline;
  }
}

/* الاتصال المباشر بـ Firebase مع مزامنة فورية بين كل الأجهزة */
function subscribeToFirebase(){
  db.collection(FS_COLLECTION).doc(FS_DOC).onSnapshot(doc=>{
    if(doc.exists){
      applyIncomingState(doc.data());
    } else {
      document.getElementById('deadlineText').textContent = STATE.deadline;
      saveState(); // أول تشغيل: أنشئي الوثيقة على Firebase بالبيانات الحالية
    }
    render();
  }, err=>{
    console.error('خطأ في مزامنة البيانات مع Firebase', err);
    alert('تعذر الاتصال بقاعدة البيانات السحابية. تأكدي من اتصال الإنترنت، أو من صحة إعدادات Firebase وقواعد الحماية (Rules).');
  });
}

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE)); }catch(e){ /* احتياط فقط */ }
  if(firebaseReady && db){
    db.collection(FS_COLLECTION).doc(FS_DOC)
      .set(JSON.parse(JSON.stringify(STATE)))
      .catch(e=>{ console.error('تعذر الحفظ على Firebase', e); alert('تعذر حفظ التغيير على قاعدة البيانات السحابية. تأكدي من اتصال الإنترنت.'); });
  }
}

/* ============ أدوات مساعدة ============ */
function uid(){ return 'e' + Math.random().toString(36).slice(2,10); }
function rowTotal(e){ return (Number(e.memo)||0)+(Number(e.cultural)||0)+(Number(e.attendance)||0)+(Number(e.system)||0)-(Number(e.violations)||0); }
function getDept(id){ return DEPARTMENTS.find(d=>d.id===id); }
function esc(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ============ التنقل ============ */
function buildNav(){
  const nav = document.getElementById('mainNav');
  const mobileSelect = document.getElementById('mobileNavSelect');

  const addBtn = document.createElement('button');
  addBtn.dataset.view = 'addMembers';
  addBtn.innerHTML = `<i class="fa-solid fa-user-plus"></i> إضافة مشتركات`;
  addBtn.onclick = ()=> goToAddMembers();
  nav.appendChild(addBtn);
  const addOpt = document.createElement('option');
  addOpt.value = 'addMembers';
  addOpt.textContent = '➕ إضافة مشتركات';
  mobileSelect.appendChild(addOpt);

  const masterBtn = document.createElement('button');
  masterBtn.dataset.view = 'master';
  masterBtn.innerHTML = `<i class="fa-solid fa-crown"></i> المشرفة العامة`;
  masterBtn.onclick = ()=> goToMasterView();
  nav.appendChild(masterBtn);
  const masterOpt = document.createElement('option');
  masterOpt.value = 'master';
  masterOpt.textContent = '👑 المشرفة العامة';
  mobileSelect.appendChild(masterOpt);

  DEPARTMENTS.forEach(d=>{
    const btn = document.createElement('button');
    btn.dataset.view = 'dept:' + d.id;
    btn.innerHTML = `<i class="${d.icon}"></i> ${d.name}`;
    btn.onclick = ()=> goTo('dept', d.id);
    nav.appendChild(btn);

    const opt = document.createElement('option');
    opt.value = 'dept:' + d.id;
    opt.textContent = d.name;
    mobileSelect.appendChild(opt);
  });
  nav.querySelector('[data-view="home"]').onclick = ()=> goTo('home');
  mobileSelect.onchange = ()=>{
    const val = mobileSelect.value;
    if(val === 'home') goTo('home');
    else if(val === 'addMembers') goToAddMembers();
    else if(val === 'master') goToMasterView();
    else goTo('dept', val.split(':')[1]);

}

function goTo(view, deptId){
  if(view === 'dept' && deptId && !requireDeptAccess(deptId)){
    setActiveNav(currentView==='home' ? 'home' : (currentDept ? 'dept:'+currentDept : 'home'));
    return;
  }
  currentView = view;
  currentDept = deptId || null;
  currentTab = 'log';
  setActiveNav(view==='home' ? 'home' : 'dept:' + deptId);
  render();
}

function goToAddMembers(deptId){
  if(deptId && !requireDeptAccess(deptId)) return;
  currentView = 'addMembers';
  addMembersDept = deptId || null;
  addMembersStatus = null;
  setActiveNav('addMembers');
  render();
}

function setActiveNav(key){
  document.querySelectorAll('#mainNav button').forEach(b=>b.classList.remove('active'));
  const btn = document.querySelector(`[data-view="${key}"]`);
  if(btn) btn.classList.add('active');
  document.getElementById('mobileNavSelect').value = key;
}

/* ============ العرض الرئيسي ============ */
function render(){
  const main = document.getElementById('mainContent');
  if(currentView === 'home'){
    main.innerHTML = renderHome();
    attachHomeEvents();
  } else if(currentView === 'dept'){
    main.innerHTML = renderDept(currentDept);
    attachDeptEvents(currentDept);
  } else if(currentView === 'addMembers'){
    main.innerHTML = renderAddMembers();
    attachAddMembersEvents();
  } else if(currentView === 'master'){
    main.innerHTML = renderMasterView();
    attachMasterViewEvents();
  }
}

function allNames(deptId){
  const set = new Set();
  STATE.departments[deptId].members.forEach(m=> set.add(m.name));
  return set;
}

function removeMember(deptId, memberId){
  const dept = STATE.departments[deptId];
  const member = dept.members.find(m=>m.id===memberId);
  if(!member) return;
  const hasEntries = dept.entries.some(e=> e.name === member.name);
  if(hasEntries && !confirm(`لهذه المشتركة سجلات رصد سابقة. حذفها من القائمة لن يحذف سجلاتها. متابعة؟`)) return;
  dept.members = dept.members.filter(m=> m.id!==memberId);
  saveState();
  render();
}

function distinctDays(deptId){
  const set = new Set();
  STATE.departments[deptId].entries.forEach(e=> set.add(e.date));
  return set;
}

function totalPointsEver(){
  let count = 0;
  DEPARTMENTS.forEach(d=> count += STATE.departments[d.id].entries.length);
  return count;
}

function totalMembers(){
  const set = new Set();
  DEPARTMENTS.forEach(d=> STATE.departments[d.id].entries.forEach(e=> set.add(d.id+'::'+e.name)));
  return set.size;
}

function topScorerOverall(){
  const map = {};
  DEPARTMENTS.forEach(d=>{
    STATE.departments[d.id].entries.forEach(e=>{
      const key = e.name;
      map[key] = (map[key]||0) + rowTotal(e);
    });
  });
  let best = null;
  Object.keys(map).forEach(k=>{ if(!best || map[k]>best.pts) best = {name:k, pts:map[k]}; });
  return best;
}

function renderHome(){
  const best = topScorerOverall();
  const cards = DEPARTMENTS.map(d=>{
    const entries = STATE.departments[d.id].entries;
    const members = allNames(d.id).size;
    const days = distinctDays(d.id).size;
    return `
    <div class="dept-card" data-dept="${d.id}">
      <span class="top-badge"><i class="fa-solid fa-lock"></i> محمي</span>
      <div class="icon" style="background:linear-gradient(135deg, ${d.color1}, ${d.color2})"><i class="${d.icon}"></i></div>
      <h3>${d.name}</h3>
      <div class="meta">
        <span><i class="fa-solid fa-user-group"></i> ${members} مشتركة</span>
        <span><i class="fa-solid fa-calendar-days"></i> ${days} يوم مرصود</span>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="hero-card">
    <div>
      <h2><i class="fa-solid fa-compass" style="color:var(--sand-deep)"></i> مرحباً بك في لوحة الرصد</h2>
      <p>اختاري القسم لتسجيل النقاط اليومية، وتابعي المجموع الختامي بعد أسبوعين (${esc(STATE.deadline)})<br>
      المشتركة التي تحصل على نقطة الحضور في جميع أيام الفترة تُضاف لها نقطتان إضافيتان في المجموع الختامي.</p>
      <p style="margin-top:8px; font-size:12px; color:#8fa9b3;">
        ${firebaseReady
          ? '<i class="fa-solid fa-cloud" style="color:#12986b;"></i> متصلة بقاعدة بيانات سحابية — البيانات تتزامن فورياً بين كل الأجهزة.'
          : '<i class="fa-solid fa-circle-info"></i> البيانات تُحفظ محلياً في هذا الجهاز فقط (لم تُفعَّل المزامنة السحابية بعد). لنقل البيانات بين الأجهزة استخدمي "تصدير نسخة احتياطية" أدناه.'}
      </p>
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;">
        <button class="quick-add-btn" id="homeAddMembersBtn"><i class="fa-solid fa-user-plus"></i> إضافة مشتركات جديدة</button>
        <button class="master-btn" id="homeMasterBtn"><i class="fa-solid fa-crown"></i> دخول المشرفة العامة</button>
      </div>
    </div>
    <div class="hero-stats">
      <div class="stat-pill"><b>${totalMembers()}</b><span>إجمالي المشتركات</span></div>
      <div class="stat-pill"><b>${totalPointsEver()}</b><span>سجل رصد</span></div>
      <div class="stat-pill"><b>${best ? esc(best.name) : '—'}</b><span>الأعلى نقاطاً</span></div>
    </div>
  </div>
  <div class="dept-grid">${cards}</div>

  <div class="panel" style="margin-top:20px;">
    <h3><i class="fa-solid fa-database"></i> نسخة احتياطية من البيانات</h3>
    <p style="font-size:12.5px; color:#6b8b98; margin-bottom:14px;">البيانات محفوظة داخل هذا الجهاز فقط. صدّري نسخة احتياطية بشكل دوري، أو لنقل البيانات إلى جهاز آخر: صدّري من هذا الجهاز ثم استوردي الملف في الجهاز الآخر (يتم الدمج دون فقدان أي بيانات موجودة).</p>
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <button class="print-btn" id="exportBtn"><i class="fa-solid fa-download"></i> تصدير نسخة احتياطية</button>
      <button class="print-btn" id="importBtn"><i class="fa-solid fa-upload"></i> استيراد نسخة احتياطية</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </div>
  </div>
  `;
}

function attachHomeEvents(){
  document.querySelectorAll('.dept-card').forEach(c=>{
    c.onclick = ()=> goTo('dept', c.dataset.dept);
  });
  document.getElementById('homeAddMembersBtn').onclick = ()=> goToAddMembers();
  document.getElementById('homeMasterBtn').onclick = ()=> goToMasterView();
  document.getElementById('exportBtn').onclick = exportBackup;
  document.getElementById('importBtn').onclick = ()=> document.getElementById('importFile').click();
  document.getElementById('importFile').onchange = (ev)=>{
    const file = ev.target.files[0];
    if(file) importBackupFile(file);
    ev.target.value = '';
  };
}

function exportBackup(){
  const blob = new Blob([JSON.stringify(STATE, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `fanar-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function importBackupFile(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data.departments) throw new Error('صيغة غير صحيحة');
      let addedEntries = 0, addedMembers = 0;
      DEPARTMENTS.forEach(d=>{
        const incoming = data.departments[d.id];
        if(!incoming) return;
        const dept = STATE.departments[d.id];
        const existingEntryIds = new Set(dept.entries.map(e=>e.id));
        (incoming.entries||[]).forEach(e=>{
          if(!existingEntryIds.has(e.id)){ dept.entries.push(e); existingEntryIds.add(e.id); addedEntries++; }
        });
        const existingNames = new Set(dept.members.map(m=>m.name));
        (incoming.members||[]).forEach(m=>{
          if(!existingNames.has(m.name)){ dept.members.push(m); existingNames.add(m.name); addedMembers++; }
        });
      });
      if(data.deadline) STATE.deadline = data.deadline;
      saveState();
      alert(`تم دمج النسخة الاحتياطية بنجاح ✅\nسجلات جديدة: ${addedEntries}\nمشتركات جديدات: ${addedMembers}`);
      render();
    }catch(err){
      alert('تعذّرت قراءة الملف — تأكدي أنه ملف نسخة احتياطية صحيح تم تصديره من هذا النظام');
    }
  };
  reader.readAsText(file);
}

/* ============ عرض قسم ============ */

  return `

  ${currentTab === 'log' ? `

    ${!members.length ? `

    </div>` : `
    <div class="form-grid">
      <div class="field" style="grid-column:span 2;">
        <label>اسم المشتركة</label>
        <select id="f_name">
          ${members.map(m=>`<option value="${esc(m.name)}">${esc(m.name)}</option>`).join('')}

        <input type="text" id="f_date" placeholder="مثال: السبت 1 صفر">
      </div>
      <div class="field">
        <label>نقاط الحفظ</label>
        <input type="number" id="f_memo" value="0" min="0">
      </div>
      <div class="field">
        <label>نقاط الثقافي</label>
        <input type="number" id="f_cultural" value="0" min="0">
      </div>
      <div class="field chk">
        <input type="checkbox" id="f_attendance">
        <label for="f_attendance">نقطة الحضور</label>
      </div>
      <div class="field">
        <label>نقاط النظام</label>
        <input type="number" id="f_system" value="0" min="0">
      </div>
    </div>
    <div class="form-grid" style="margin-top:12px;">
      <div class="field">
        <label>خصم المخالفات</label>
        <input type="number" id="f_violations" value="0" min="0">
      </div>
      <div style="grid-column:span 5;"></div>
      <button class="add-btn" id="addEntryBtn"><i class="fa-solid fa-floppy-disk"></i> حفظ الرصد</button>
    </div>`}
  </div>

  <div class="panel" data-panel-kind="log" data-panel-dept="${deptId}">
    <div class="summary-toolbar">
      <h3 style="margin:0;"><i class="fa-solid fa-list-check"></i> جميع السجلات (${entries.length})</h3>
      <button class="print-btn" data-print-kind="log" data-print-dept="${deptId}"><i class="fa-solid fa-file-pdf"></i> طباعة / تصدير PDF</button>
    </div>
    <div class="print-header">
      <h2>نادي فنار — ${esc(d.name)}</h2>
      <p>سجل الرصد اليومي — تاريخ الطباعة: ${new Date().toLocaleDateString('ar-SA')}</p>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr>
          <th>الاسم</th><th>اليوم</th><th>نقاط الحفظ</th><th>نقاط الثقافي</th><th>نقطة الحضور</th><th>نقاط النظام</th><th>خصم المخالفات</th><th>المجموع</th><th class="no-print"></th>
        </tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>
  </div>` : renderSummary(deptId)}
  `;
}

function renderAddMembers(){
  if(!addMembersDept){
    const cards = DEPARTMENTS.map(d=>{
      const count = STATE.departments[d.id].members.length;
      return `
      <div class="dept-card" data-dept="${d.id}">
        <div class="icon" style="background:linear-gradient(135deg, ${d.color1}, ${d.color2})"><i class="${d.icon}"></i></div>
        <h3>${d.name}</h3>
        <div class="meta"><span><i class="fa-solid fa-user-group"></i> ${count} مشتركة مسجّلة حالياً</span></div>
      </div>`;
    }).join('');
    return `
    <div class="hero-card">
      <div>
        <h2><i class="fa-solid fa-user-plus" style="color:var(--sand-deep)"></i> إضافة المشتركات</h2>
        <p>اختاري إدارتك أولاً، ثم عبّئي كل أسماء المشتركات دفعة واحدة — ستظهر تلقائياً في خانة الرصد بعد الحفظ.</p>
      </div>
    </div>
    <div class="dept-grid">${cards}</div>`;
  }

  const d = getDept(addMembersDept);
  const members = STATE.departments[addMembersDept].members.slice().sort((a,b)=> a.name.localeCompare(b.name,'ar'));

  return `
  <div class="dept-header">
    <button class="back-btn" id="backToDeptPicker"><i class="fa-solid fa-arrow-right"></i> تغيير الإدارة</button>
    <div class="icon-lg" style="background:linear-gradient(135deg, ${d.color1}, ${d.color2})"><i class="${d.icon}"></i></div>
    <div style="flex:1;">
      <h2>${d.name}</h2>
      <p>إضافة مشتركات جديدة لهذا القسم</p>
    </div>
  </div>

  <div class="panel">
    <h3><i class="fa-solid fa-list-ul"></i> عبّئي الأسماء دفعة واحدة</h3>
    <p style="font-size:12.5px; color:#6b8b98; margin-bottom:10px;">اكتبي اسم كل مشتركة في سطر مستقل، ثم اضغطي "إضافة الأسماء" لحفظها كلها مرة واحدة.</p>
    <textarea id="bulkNamesInput" rows="7" placeholder="سارة أحمد&#10;نورة محمد&#10;ريم خالد&#10;..."></textarea>
    <div style="display:flex; justify-content:flex-end; margin-top:12px;">
      <button class="add-btn" id="bulkAddBtn" style="width:auto; padding:11px 26px;"><i class="fa-solid fa-floppy-disk"></i> إضافة الأسماء</button>
    </div>
    ${addMembersStatus ? `
    <div class="status-banner">
      <i class="fa-solid fa-circle-check"></i>
      تمت إضافة <b>${addMembersStatus.added}</b> مشتركة${addMembersStatus.dup ? ` — وتم تجاهل <b>${addMembersStatus.dup}</b> اسم مكرر` : ''}
    </div>` : ''}
  </div>

  <div class="panel">
    <h3><i class="fa-solid fa-user-group"></i> المشتركات المسجلات حالياً (${members.length})</h3>
    <div class="chip-list">
      ${members.length ? members.map(m=>`
        <span class="chip">${esc(m.name)} <i class="fa-solid fa-xmark" data-rm="${m.id}"></i></span>
      `).join('') : `<span style="color:#8fa9b3; font-size:13px;">لا توجد مشتركات مسجلة بعد لهذا القسم</span>`}
    </div>
  </div>
  `;
}

function addMembersBulk(deptId, namesText){
  const dept = STATE.departments[deptId];
  const existing = new Set(dept.members.map(m=>m.name));
  const lines = namesText.split('\n').map(s=>s.trim()).filter(Boolean);
  let added = 0, dup = 0;
  lines.forEach(n=>{
    if(existing.has(n)){ dup++; return; }
    dept.members.push({ id: uid(), name: n });
    existing.add(n);
    added++;
  });
  saveState();
  return { added, dup };
}

function attachAddMembersEvents(){
  if(!addMembersDept){
    document.querySelectorAll('.dept-card').forEach(c=>{
      c.onclick = ()=> goToAddMembers(c.dataset.dept);
    });
    return;
  }
  document.getElementById('backToDeptPicker').onclick = ()=> goToAddMembers(null);
  document.getElementById('bulkAddBtn').onclick = ()=>{
    const ta = document.getElementById('bulkNamesInput');
    if(!ta.value.trim()){ alert('الرجاء كتابة اسم واحد على الأقل'); return; }
    addMembersStatus = addMembersBulk(addMembersDept, ta.value);
    render();
  };
  document.querySelectorAll('.chip [data-rm]').forEach(x=>{
    x.onclick = ()=> removeMember(addMembersDept, x.dataset.rm);
  });
}

function renderMasterView(){
  const sections = DEPARTMENTS.map(d=>`
    <div class="master-dept-block" style="border-top-color:${d.color1}">
      <div class="master-dept-title">
        <div class="icon" style="background:linear-gradient(135deg, ${d.color1}, ${d.color2})"><i class="${d.icon}"></i></div>
        <h3>${d.name}</h3>
      </div>
      ${renderSummary(d.id)}
    </div>
  `).join('');

  return `
  <div class="dept-header">
    <button class="back-btn" id="backHomeMaster"><i class="fa-solid fa-arrow-right"></i> الرئيسية</button>
    <div style="flex:1;">
      <h2><i class="fa-solid fa-crown" style="color:var(--sand-deep)"></i> لوحة المشرفة العامة</h2>
      <p>المجموع الختامي لكل الأقسام الستة في مكان واحد</p>
    </div>
  </div>
  ${sections}
  `;
}

function attachMasterViewEvents(){
  document.getElementById('backHomeMaster').onclick = ()=> goTo('home');
  attachPrintButtons();
}

function renderSummary(deptId){
  const entries = STATE.departments[deptId].entries;
  const days = distinctDays(deptId);
  const totalDays = days.size;

  const perName = {};
  entries.forEach(e=>{
    if(!perName[e.name]) perName[e.name] = { name:e.name, sum:0, attendDays:0 };
    perName[e.name].sum += rowTotal(e);
    if(Number(e.attendance)) perName[e.name].attendDays += 1;
  });

  const rows = Object.values(perName).map(p=>{
    const fullAttendance = totalDays>0 && p.attendDays===totalDays;
    const bonus = fullAttendance ? 2 : 0;
    return { ...p, bonus, final: p.sum + bonus };
  }).sort((a,b)=> b.final - a.final);

  const rowsHtml = rows.length ? rows.map((r,i)=>`
    <tr>
      <td class="rank-cell ${i===0?'rank-1':''}">${i+1}${i===0?' <i class="fa-solid fa-crown"></i>':''}</td>
      <td class="name-cell">${esc(r.name)}</td>
      <td>${r.attendDays} / ${totalDays}</td>
      <td>${r.sum}</td>
      <td>${r.bonus ? `<span class="bonus-tag"><i class="fa-solid fa-star"></i> +2</span>` : '—'}</td>
      <td class="total-cell">${r.final}</td>
    </tr>`).join('') :
    `<tr><td colspan="6"><div class="empty-state"><i class="fa-solid fa-chart-simple"></i><div>لا توجد بيانات كافية لعرض الملخص الختامي</div></div></td></tr>`;

  return `
  <div class="panel" data-panel-kind="summary" data-panel-dept="${deptId}">
    <div class="summary-toolbar">
      <h3 style="margin:0;"><i class="fa-solid fa-trophy"></i> ${esc(getDept(deptId).name)} — المجموع الختامي حتى ${esc(STATE.deadline)}</h3>
      <button class="print-btn" data-print-kind="summary" data-print-dept="${deptId}"><i class="fa-solid fa-file-pdf"></i> طباعة / تصدير PDF</button>
    </div>
    <div class="note" style="margin-bottom:14px;"><i class="fa-solid fa-circle-info"></i> عدد أيام الرصد المسجلة لهذا القسم: <b>${totalDays}</b> يوم — من حصلت على نقطة الحضور في كل الأيام تُضاف لها نقطتان إضافيتان تلقائياً</div>
    <div class="print-header">
      <h2>نادي فنار — ${esc(getDept(deptId).name)}</h2>
      <p>المجموع الختامي حتى ${esc(STATE.deadline)} — تاريخ الطباعة: ${new Date().toLocaleDateString('ar-SA')}</p>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr><th>الترتيب</th><th>الاسم</th><th>أيام الحضور</th><th>مجموع النقاط</th><th>مكافأة الحضور الكامل</th><th>المجموع النهائي</th></tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>
  </div>`;
}

/* ============ الأحداث ============ */
function attachDeptEvents(deptId){
  document.getElementById('backHome').onclick = ()=> goTo('home');
  document.querySelectorAll('.nav [data-tab]').forEach(b=>{
    b.onclick = ()=>{ currentTab = b.dataset.tab; render(); };
  });
  document.getElementById('quickAddMemberBtn').onclick = ()=> goToAddMembers(deptId);

  if(currentTab === 'log'){
    const addBtn = document.getElementById('addEntryBtn');
    if(addBtn) addBtn.onclick = ()=> addEntry(deptId);
    const goAddBtn = document.getElementById('goAddMembersBtn');
    if(goAddBtn) goAddBtn.onclick = ()=> goToAddMembers(deptId);
    document.querySelectorAll('.del-btn').forEach(b=>{
      b.onclick = ()=> deleteEntry(deptId, b.dataset.del);
    });
  }
  attachPrintButtons();
}

function printSection(kind, deptId){
  try{
    if(!sessionStorage.getItem('fanar-print-tip-seen')){
      alert('لتصدير الملف كـ PDF بدل الطباعة الورقية:\nفي نافذة الطباعة التي ستظهر، اختاري من قائمة "الوجهة / Destination" خيار "حفظ كـ PDF / Save as PDF" ثم اضغطي حفظ.');
      sessionStorage.setItem('fanar-print-tip-seen', '1');
    }
  }catch(e){ /* لا مشكلة إن تعذّر حفظ حالة التلميح، سيظهر مرة أخرى فقط */ }

  const target = document.querySelector(`[data-panel-kind="${kind}"][data-panel-dept="${deptId}"]`);
  if(!target) return;
  document.querySelectorAll('.print-target').forEach(el=> el.classList.remove('print-target'));
  target.classList.add('print-target');
  document.body.classList.add('print-mode');

  const cleanup = ()=>{
    document.body.classList.remove('print-mode');
    target.classList.remove('print-target');
    window.removeEventListener('afterprint', cleanup);
  };
  window.addEventListener('afterprint', cleanup);
  setTimeout(()=> window.print(), 50);
}

function attachPrintButtons(){
  document.querySelectorAll('.print-btn[data-print-kind]').forEach(btn=>{
    btn.onclick = ()=> printSection(btn.dataset.printKind, btn.dataset.printDept);
  });
}

function addEntry(deptId){
  const nameSelect = document.getElementById('f_name');
  const name = nameSelect.value.trim();
  const date = document.getElementById('f_date').value.trim();
  if(!STATE.departments[deptId].members.length){ alert('أضيفي المشتركات أولاً من لوحة "إدارة المشتركات" بالأعلى'); return; }
  if(!name){ alert('الرجاء اختيار اسم المشتركة'); return; }
  if(!date){ alert('الرجاء إدخال اليوم / التاريخ'); return; }

  const entry = {
    id: uid(),
    name, date,
    memo: Number(document.getElementById('f_memo').value)||0,
    cultural: Number(document.getElementById('f_cultural').value)||0,
    attendance: document.getElementById('f_attendance').checked ? 1 : 0,
    system: Number(document.getElementById('f_system').value)||0,
    violations: Number(document.getElementById('f_violations').value)||0,
  };
  STATE.departments[deptId].entries.push(entry);
  saveState();
  render();
}

function deleteEntry(deptId, id){
  if(!confirm('تأكيد حذف هذا السجل؟')) return;
  STATE.departments[deptId].entries = STATE.departments[deptId].entries.filter(e=>e.id!==id);
  saveState();
  render();
}

/* ============ بدء التشغيل ============ */
(function init(){
  buildNav();
  if(typeof firebase !== 'undefined' && isFirebaseConfigured()){
    initFirebase();
    if(firebaseReady){
      render(); // عرض أولي فوري (سيُستكمل تلقائياً بمجرد وصول البيانات من Firebase)
      subscribeToFirebase();
      return;
    }
  }
  // لم تُفعَّل إعدادات Firebase بعد، أو تعذّر الاتصال — استخدام التخزين المحلي كخطة بديلة
  loadStateLocal();
  render();
})();

</script>
